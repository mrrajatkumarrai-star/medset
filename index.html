<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />
  <title>Minimal Dual Spiral Visualizer</title>

  <style>
    :root {
      --bg: #05070b;
      --line: rgba(255,255,255,0.16);
      --text: rgba(240,246,255,0.96);
      --muted: rgba(186,198,218,0.72);
      --blue: #8fd4ff;
      --transition: 700ms cubic-bezier(.2,.8,.2,1);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: relative;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: scale(1.015);
      filter: blur(8px);
      transition:
        opacity var(--transition),
        transform var(--transition),
        filter var(--transition);
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
      filter: blur(0);
    }

    /* ---------------------------
       Screen 1
    --------------------------- */
    #setupScreen {
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.05), transparent 20%),
        linear-gradient(135deg, #04060a 0%, #08111d 55%, #04070c 100%);
    }

    .miniForm {
      width: min(460px, 100%);
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(0,0,0,0.14);
    }

    .miniForm h1 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

    .miniForm p {
      margin: 0 0 14px;
      font-size: 12px;
      line-height: 1.45;
      color: var(--muted);
    }

    .fieldGrid {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 11px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .field input[type="file"],
    .field input[type="text"],
    .field input[type="range"],
    .field input[type="color"] {
      width: 100%;
    }

    .field input[type="file"],
    .field input[type="text"],
    .field input[type="color"] {
      min-height: 34px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      background: transparent;
      color: var(--text);
      outline: none;
    }

    .field input[type="text"]::placeholder {
      color: rgba(180,190,205,0.42);
    }

    .field input[type="color"] {
      padding: 4px;
      cursor: pointer;
    }

    .field input[type="range"] {
      appearance: none;
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      outline: none;
    }

    .field input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: #dff5ff;
      cursor: pointer;
    }

    .field input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.25);
      background: #dff5ff;
      cursor: pointer;
    }

    .opposite {
      transform: scaleX(-1);
    }

    .val {
      font-size: 11px;
      color: var(--blue);
    }

    .line2 {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .submitBtn {
      margin-top: 12px;
      width: 100%;
      min-height: 38px;
      border: 1px solid rgba(255,255,255,0.22);
      background: transparent;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 11px;
      cursor: pointer;
    }

    .submitBtn:hover {
      background: rgba(255,255,255,0.06);
    }

    .status {
      margin-top: 8px;
      min-height: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    /* ---------------------------
       Screen 2
    --------------------------- */
    #visualizerScreen {
      overflow: hidden;
      background: #02040a;
    }

    .bgDrift {
      position: absolute;
      inset: -40%;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 25%, rgba(80, 210, 255, 0.18), transparent 24%),
        radial-gradient(circle at 78% 28%, rgba(113, 133, 255, 0.16), transparent 26%),
        radial-gradient(circle at 50% 80%, rgba(255,255,255,0.06), transparent 18%),
        linear-gradient(135deg, #02040a 0%, #09121f 48%, #02050a 100%);
      will-change: transform;
      animation: driftBg 18s linear infinite;
    }

    @keyframes driftBg {
      0%   { transform: scale(1.15) rotate(0deg); }
      50%  { transform: scale(1.22) rotate(7deg); }
      100% { transform: scale(1.15) rotate(14deg); }
    }

    #particleCanvas,
    #renderCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    #particleCanvas {
      opacity: 0.82;
    }

    .centerText {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 5;
      pointer-events: none;
      text-align: center;
      max-width: min(84vw, 1100px);
      color: #ffffff;
      opacity: 0;
      transition: opacity 220ms ease;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.08;
      font-weight: 800;
      letter-spacing: 0.02em;
      background: transparent;
      border: 0;
      box-shadow: none;
      padding: 0;
    }

    .centerText.visible {
      opacity: 1;
    }

    .topActions {
      position: absolute;
      top: max(10px, env(safe-area-inset-top));
      right: max(10px, env(safe-area-inset-right));
      z-index: 8;
      display: flex;
      gap: 8px;
      opacity: 0.08;
      transition: opacity 220ms ease;
    }

    #visualizerScreen:hover .topActions,
    #visualizerScreen.show-ui .topActions {
      opacity: 0.78;
    }

    .iconBtn {
      width: 24px;
      height: 24px;
      border: 0;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .iconBtn:hover,
    .iconBtn:focus-visible {
      background: rgba(255,255,255,0.16);
      outline: none;
    }

    @media (max-width: 640px) {
      .miniForm {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Screen 1 -->
  <section id="setupScreen" class="screen active">
    <div class="miniForm">
      <h1>Spiral Visualizer</h1>
      <p>PNG or SVG supported. Center text stays fixed while visuals move under it.</p>

      <div class="fieldGrid">
        <div class="field">
          <label for="fileA">Image A (PNG/SVG)</label>
          <input id="fileA" type="file" accept=".png,.svg,image/png,image/svg+xml" />
        </div>

        <div class="field">
          <label for="fileB">Image B (PNG/SVG)</label>
          <input id="fileB" type="file" accept=".png,.svg,image/png,image/svg+xml" />
        </div>

        <div class="field">
          <div class="line2">
            <label for="speedA">Image A speed</label>
            <span id="speedAVal" class="val">42°/s</span>
          </div>
          <input id="speedA" type="range" min="0" max="300" value="42" />
        </div>

        <div class="field">
          <div class="line2">
            <label for="speedB">Image B speed</label>
            <span id="speedBVal" class="val">56°/s</span>
          </div>
          <input id="speedB" class="opposite" type="range" min="0" max="300" value="56" />
        </div>

        <div class="field">
          <label for="centerTextInput">Center text</label>
          <input id="centerTextInput" type="text" placeholder="Type text for the center" />
        </div>

        <div class="field">
          <div class="line2">
            <label for="fontSizeRange">Text size</label>
            <span id="fontSizeVal" class="val">72px</span>
          </div>
          <input id="fontSizeRange" type="range" min="18" max="180" value="72" />
        </div>

        <div class="field">
          <label for="textColorInput">Text color</label>
          <input id="textColorInput" type="color" value="#ffffff" />
        </div>
      </div>

      <button id="submitBtn" class="submitBtn">Submit</button>
      <div id="status" class="status"></div>
    </div>
  </section>

  <!-- Screen 2 -->
  <section id="visualizerScreen" class="screen" aria-hidden="true">
    <div class="bgDrift"></div>
    <canvas id="particleCanvas"></canvas>
    <canvas id="renderCanvas"></canvas>

    <div id="centerTextLayer" class="centerText"></div>

    <div class="topActions">
      <button id="fullscreenBtn" class="iconBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">⤢</button>
      <button id="closeBtn" class="iconBtn" title="Close" aria-label="Close">✕</button>
    </div>
  </section>

  <script>
    (() => {
      const ui = {
        setupScreen: document.getElementById('setupScreen'),
        visualizerScreen: document.getElementById('visualizerScreen'),
        fileA: document.getElementById('fileA'),
        fileB: document.getElementById('fileB'),
        speedA: document.getElementById('speedA'),
        speedB: document.getElementById('speedB'),
        speedAVal: document.getElementById('speedAVal'),
        speedBVal: document.getElementById('speedBVal'),
        centerTextInput: document.getElementById('centerTextInput'),
        fontSizeRange: document.getElementById('fontSizeRange'),
        fontSizeVal: document.getElementById('fontSizeVal'),
        textColorInput: document.getElementById('textColorInput'),
        submitBtn: document.getElementById('submitBtn'),
        status: document.getElementById('status'),
        fullscreenBtn: document.getElementById('fullscreenBtn'),
        closeBtn: document.getElementById('closeBtn'),
        centerTextLayer: document.getElementById('centerTextLayer'),
        renderCanvas: document.getElementById('renderCanvas'),
        particleCanvas: document.getElementById('particleCanvas')
      };

      const renderCtx = ui.renderCanvas.getContext('2d', { alpha: true, desynchronized: true });
      const particleCtx = ui.particleCanvas.getContext('2d', { alpha: true, desynchronized: true });

      const state = {
        active: false,
        rafId: 0,
        startTime: 0,
        uiTimer: 0,
        width: 0,
        height: 0,
        cx: 0,
        cy: 0,
        dpr: 1,
        diag: 0,
        renderBox: 0,
        particleSprite: null,
        glowA: null,
        glowB: null,
        particles: [],
        uploads: [
          { source: null, url: null, name: '' },
          { source: null, url: null, name: '' }
        ]
      };

      const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

      function setStatus(message = '') {
        ui.status.textContent = message;
      }

      function hexToRgb(hex) {
        const clean = hex.replace('#', '');
        const full = clean.length === 3
          ? clean.split('').map(c => c + c).join('')
          : clean;
        const value = parseInt(full, 16);
        return {
          r: (value >> 16) & 255,
          g: (value >> 8) & 255,
          b: value & 255
        };
      }

      function rgba(hex, alpha) {
        const c = hexToRgb(hex);
        return `rgba(${c.r}, ${c.g}, ${c.b}, ${alpha})`;
      }

      function updateLabels() {
        ui.speedAVal.textContent = `${ui.speedA.value}°/s`;
        ui.speedBVal.textContent = `${ui.speedB.value}°/s`;
        ui.fontSizeVal.textContent = `${ui.fontSizeRange.value}px`;
      }

      function updateCenterText() {
        const text = ui.centerTextInput.value.trim();
        const color = ui.textColorInput.value;
        const glow1 = rgba(color, 0.38);
        const glow2 = rgba(color, 0.20);
        const glow3 = rgba(color, 0.12);

        ui.centerTextLayer.textContent = text;
        ui.centerTextLayer.style.fontSize = `${ui.fontSizeRange.value}px`;
        ui.centerTextLayer.style.color = color;
        ui.centerTextLayer.style.webkitTextStroke = `1px ${rgba(color, 0.75)}`;
        ui.centerTextLayer.style.textShadow = `
          0 0 2px ${rgba(color, 0.95)},
          0 0 10px ${glow1},
          0 0 22px ${glow2},
          0 0 44px ${glow3}
        `;
        ui.centerTextLayer.classList.toggle('visible', text.length > 0);
      }

      function pingUI() {
        ui.visualizerScreen.classList.add('show-ui');
        clearTimeout(state.uiTimer);
        state.uiTimer = setTimeout(() => {
          ui.visualizerScreen.classList.remove('show-ui');
        }, 1600);
      }

      function revokeUpload(index) {
        if (state.uploads[index].url) {
          URL.revokeObjectURL(state.uploads[index].url);
          state.uploads[index].url = null;
        }
      }

      function clearUpload(index) {
        revokeUpload(index);
        state.uploads[index].source = null;
        state.uploads[index].name = '';
      }

      async function loadRenderableFile(file) {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.decoding = 'async';
        img.src = url;
        await img.decode();
        return { element: img, url };
      }

      async function onFileSelected(file, index) {
        if (!file) {
          clearUpload(index);
          return;
        }

        if (!['image/png', 'image/svg+xml'].includes(file.type)) {
          setStatus('Please use PNG or SVG files only.');
          return;
        }

        try {
          setStatus('Loading image…');
          revokeUpload(index);

          const loaded = await loadRenderableFile(file);
          state.uploads[index].source = loaded.element;
          state.uploads[index].url = loaded.url;
          state.uploads[index].name = file.name;
          setStatus('');
        } catch (err) {
          clearUpload(index);
          setStatus('Could not load that image.');
        }
      }

      function createRadialSprite(size, stops) {
        const c = document.createElement('canvas');
        c.width = size;
        c.height = size;
        const ctx = c.getContext('2d');

        const g = ctx.createRadialGradient(size / 2, size / 2, 0, size / 2, size / 2, size / 2);
        stops.forEach(([stop, color]) => g.addColorStop(stop, color));
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, size, size);

        return c;
      }

      function initSprites() {
        state.particleSprite = createRadialSprite(64, [
          [0, 'rgba(255,255,255,1)'],
          [0.25, 'rgba(145,220,255,0.9)'],
          [0.6, 'rgba(110,145,255,0.28)'],
          [1, 'rgba(0,0,0,0)']
        ]);

        state.glowA = createRadialSprite(512, [
          [0, 'rgba(130,220,255,0.30)'],
          [0.4, 'rgba(90,130,255,0.12)'],
          [1, 'rgba(0,0,0,0)']
        ]);

        state.glowB = createRadialSprite(512, [
          [0, 'rgba(120,150,255,0.28)'],
          [0.42, 'rgba(120,220,255,0.10)'],
          [1, 'rgba(0,0,0,0)']
        ]);
      }

      function resizeAll() {
        state.dpr = Math.min(window.devicePixelRatio || 1, 1.75);
        state.width = window.innerWidth;
        state.height = window.innerHeight;
        state.cx = state.width * 0.5;
        state.cy = state.height * 0.5;
        state.diag = Math.hypot(state.width, state.height);

        ui.renderCanvas.width = Math.round(state.width * state.dpr);
        ui.renderCanvas.height = Math.round(state.height * state.dpr);
        ui.renderCanvas.style.width = `${state.width}px`;
        ui.renderCanvas.style.height = `${state.height}px`;

        ui.particleCanvas.width = Math.round(state.width * state.dpr);
        ui.particleCanvas.height = Math.round(state.height * state.dpr);
        ui.particleCanvas.style.width = `${state.width}px`;
        ui.particleCanvas.style.height = `${state.height}px`;

        renderCtx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        particleCtx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);

        renderCtx.imageSmoothingEnabled = true;
        renderCtx.imageSmoothingQuality = 'high';
        particleCtx.imageSmoothingEnabled = true;
        particleCtx.imageSmoothingQuality = 'low';

        state.renderBox = Math.max(state.diag * 1.18, 1400);

        initParticles();
        updateCenterText();
      }

      function initParticles() {
        const count = Math.max(18, Math.min(36, Math.floor((state.width * state.height) / 65000)));
        state.particles = Array.from({ length: count }, () => ({
          angle: Math.random() * Math.PI * 2,
          radius: Math.random() * Math.max(state.width, state.height) * 0.55,
          size: 0.7 + Math.random() * 1.4,
          speed: 0.00014 + Math.random() * 0.00028,
          alpha: 0.04 + Math.random() * 0.10,
          phase: Math.random() * Math.PI * 2
        }));
      }

      function drawParticles(time) {
        particleCtx.clearRect(0, 0, state.width, state.height);
        particleCtx.globalCompositeOperation = 'screen';

        for (let i = 0; i < state.particles.length; i++) {
          const p = state.particles[i];
          const a = p.angle + time * p.speed;
          const r = p.radius * (0.95 + 0.05 * Math.sin(time * 0.001 + p.phase));
          const x = state.cx + Math.cos(a) * r;
          const y = state.cy + Math.sin(a * 1.04) * r * 0.94;
          const size = p.size * 26;

          particleCtx.globalAlpha = p.alpha * (0.65 + 0.35 * Math.sin(time * 0.0012 + p.phase));
          particleCtx.drawImage(state.particleSprite, x - size / 2, y - size / 2, size, size);
        }

        particleCtx.globalAlpha = 1;
        particleCtx.globalCompositeOperation = 'source-over';
      }

      function coverSizeForSource(source, box, extraScale = 1) {
        const sw = source.naturalWidth || source.width;
        const sh = source.naturalHeight || source.height;
        const scale = Math.max(box / sw, box / sh) * extraScale;
        return {
          width: sw * scale,
          height: sh * scale
        };
      }

      function drawVisualLayer(source, glow, cx, cy, radians, scalePulse, alpha) {
        const fitted = coverSizeForSource(source, state.renderBox, scalePulse);

        renderCtx.save();
        renderCtx.translate(cx, cy);
        renderCtx.rotate(radians);

        renderCtx.globalCompositeOperation = 'screen';
        renderCtx.globalAlpha = alpha * 0.52;
        renderCtx.drawImage(glow, -state.renderBox * 0.62, -state.renderBox * 0.62, state.renderBox * 1.24, state.renderBox * 1.24);

        renderCtx.globalCompositeOperation = 'source-over';
        renderCtx.globalAlpha = alpha;
        renderCtx.drawImage(
          source,
          -fitted.width / 2,
          -fitted.height / 2,
          fitted.width,
          fitted.height
        );

        renderCtx.restore();
      }

      function render(time) {
        if (!state.startTime) state.startTime = time;

        if (state.active) {
          const elapsed = (time - state.startTime) / 1000;
          const minSide = Math.min(state.width, state.height);

          drawParticles(time);
          renderCtx.clearRect(0, 0, state.width, state.height);

          const speedA = Number(ui.speedA.value);
          const speedB = Number(ui.speedB.value);

          const orbit = minSide * 0.017;
          const orbitA = orbit * (0.86 + 0.14 * Math.sin(elapsed * 0.9));
          const orbitB = orbit * (0.86 + 0.14 * Math.cos(elapsed * 0.86));

          const ax =
            Math.cos(elapsed * 0.7) * orbitA * 0.74 +
            Math.sin(elapsed * 1.7) * orbitA * 0.11;

          const ay =
            Math.sin(elapsed * 0.74) * orbitA * 0.74 +
            Math.cos(elapsed * 1.46) * orbitA * 0.10;

          const bx =
            Math.cos(elapsed * 0.7 + Math.PI) * orbitB * 0.74 +
            Math.sin(elapsed * 1.58 + Math.PI) * orbitB * 0.10;

          const by =
            Math.sin(elapsed * 0.74 + Math.PI) * orbitB * 0.74 +
            Math.cos(elapsed * 1.62 + Math.PI) * orbitB * 0.10;

          const pulse = 1 + 0.012 * Math.sin(elapsed * 1.15);
          const pulseA = pulse * (1 + 0.005 * Math.sin(elapsed * 2.1));
          const pulseB = pulse * (1 - 0.005 * Math.sin(elapsed * 1.9));

          if (state.uploads[0].source) {
            drawVisualLayer(
              state.uploads[0].source,
              state.glowA,
              state.cx + ax,
              state.cy + ay,
              elapsed * speedA * Math.PI / 180,
              pulseA,
              0.95
            );
          }

          if (state.uploads[1].source) {
            drawVisualLayer(
              state.uploads[1].source,
              state.glowB,
              state.cx + bx,
              state.cy + by,
              -elapsed * speedB * Math.PI / 180,
              pulseB,
              0.93
            );
          }
        }

        state.rafId = requestAnimationFrame(render);
      }

      function openVisualizer() {
        ui.setupScreen.classList.remove('active');
        ui.visualizerScreen.classList.add('active');
        ui.visualizerScreen.setAttribute('aria-hidden', 'false');
        state.active = true;
        state.startTime = 0;
        updateCenterText();
        pingUI();
      }

      async function closeVisualizer() {
        state.active = false;

        if (document.fullscreenElement) {
          try {
            await document.exitFullscreen();
          } catch (e) {}
        }

        ui.visualizerScreen.classList.remove('active');
        ui.setupScreen.classList.add('active');
        ui.visualizerScreen.setAttribute('aria-hidden', 'true');
      }

      async function toggleFullscreen() {
        try {
          if (!document.fullscreenElement) {
            await ui.visualizerScreen.requestFullscreen();
          } else {
            await document.exitFullscreen();
          }
        } catch (e) {}
      }

      function bindEvents() {
        ui.fileA.addEventListener('change', (e) => onFileSelected(e.target.files[0], 0));
        ui.fileB.addEventListener('change', (e) => onFileSelected(e.target.files[0], 1));

        ui.speedA.addEventListener('input', updateLabels);
        ui.speedB.addEventListener('input', updateLabels);

        ui.centerTextInput.addEventListener('input', updateCenterText);
        ui.fontSizeRange.addEventListener('input', () => {
          updateLabels();
          updateCenterText();
        });
        ui.textColorInput.addEventListener('input', updateCenterText);

        ui.submitBtn.addEventListener('click', openVisualizer);
        ui.fullscreenBtn.addEventListener('click', toggleFullscreen);
        ui.closeBtn.addEventListener('click', closeVisualizer);

        ui.visualizerScreen.addEventListener('mousemove', pingUI);
        ui.visualizerScreen.addEventListener('touchstart', pingUI, { passive: true });

        window.addEventListener('resize', resizeAll, { passive: true });

        document.addEventListener('visibilitychange', () => {
          if (document.hidden && state.rafId) {
            cancelAnimationFrame(state.rafId);
            state.rafId = 0;
          } else if (!document.hidden && !state.rafId) {
            state.rafId = requestAnimationFrame(render);
          }
        });
      }

      function init() {
        initSprites();
        resizeAll();
        updateLabels();
        updateCenterText();
        bindEvents();
        state.rafId = requestAnimationFrame(render);
      }

      init();
    })();
  </script>
</body>
