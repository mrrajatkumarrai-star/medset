<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Ultra Smooth Dual Spiral Visualizer</title>

  <style>
    :root {
      --bg-0: #02040a;
      --text: rgba(245, 250, 255, 0.96);
      --text-soft: rgba(210, 226, 248, 0.72);
      --blue-1: #dff8ff;
      --blue-2: #8fd8ff;
      --blue-3: #75a8ff;
      --shadow: 0 22px 70px rgba(0, 0, 0, 0.42), 0 0 80px rgba(84, 169, 255, 0.08);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --transition: 760ms cubic-bezier(.2, .8, .2, 1);
      --layer-size: 2000px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-0);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      position: relative;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transform: scale(1.02);
      filter: blur(10px);
      transition: opacity var(--transition), transform var(--transition), filter var(--transition);
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
      filter: blur(0);
    }

    /* ---------------------------------
       SCREEN 1 - SETUP
    --------------------------------- */
    #setupScreen {
      display: grid;
      place-items: center;
      padding: clamp(14px, 3vw, 30px);
      background: radial-gradient(circle at 16% 18%, rgba(255,255,255,0.08), transparent 24%),
                  radial-gradient(circle at 84% 20%, rgba(255,255,255,0.06), transparent 22%),
                  linear-gradient(135deg, #02040a 0%, #07111d 48%, #02050b 100%);
    }

    .panel {
      position: relative;
      width: min(1000px, 100%);
      max-height: min(94vh, 920px);
      overflow: auto;
      padding: clamp(18px, 2.5vw, 28px);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
    }

    .hero { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
    .hero h1 { margin: 0 0 10px; font-size: clamp(30px, 5vw, 54px); line-height: 0.95; font-weight: 850; color: transparent; background: linear-gradient(180deg, var(--blue-1), var(--blue-2), var(--blue-3)); -webkit-background-clip: text; background-clip: text; }
    .hero p { margin: 0; max-width: 700px; font-size: clamp(14px, 1.8vw, 16px); line-height: 1.55; color: var(--text-soft); }
    .tag { padding: 10px 14px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); font-size: 12px; text-transform: uppercase; }

    .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .card { padding: 18px; border-radius: var(--radius-lg); background: linear-gradient(180deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03)); border: 1px solid rgba(255,255,255,0.10); }
    .card h2 { margin: 0 0 14px; font-size: 15px; text-transform: uppercase; font-weight: 800; }
    
    .uploadBox, .controls { display: grid; gap: 14px; }
    .fileWrap { display: grid; gap: 10px; }
    .fileButton { position: relative; min-height: 108px; display: flex; align-items: center; justify-content: center; text-align: center; padding: 16px; border-radius: var(--radius-md); border: 1px dashed rgba(255,255,255,0.18); background: rgba(255,255,255,0.04); cursor: pointer; transition: 200ms; }
    .fileButton:hover { border-color: rgba(157, 221, 255, 0.45); background: rgba(255,255,255,0.08); }
    .fileButton input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .fileMeta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-soft); }
    
    .row { display: grid; gap: 8px; }
    .labelLine { display: flex; justify-content: space-between; font-size: 13px; }
    .value { color: #9dd8ff; font-weight: 700; }
    
    input[type="range"] { width: 100%; appearance: none; height: 10px; border-radius: 999px; outline: none; background: rgba(255,255,255,0.14); }
    input[type="range"]::-webkit-slider-thumb { appearance: none; width: 18px; height: 18px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.28); background: #fff; cursor: pointer; }
    input[type="range"]::-moz-range-thumb { width: 18px; height: 18px; border: 0; border-radius: 50%; background: #fff; cursor: pointer; }
    
    .footer { display: flex; justify-content: center; padding-top: 18px; }
    .submitBtn { min-width: min(340px, 100%); padding: 17px 26px; border: 0; border-radius: 999px; cursor: pointer; color: #031018; font-weight: 900; letter-spacing: 0.18em; text-transform: uppercase; background: linear-gradient(90deg, #f9feff, #bdefff 48%, #8fc3ff 100%); box-shadow: 0 14px 38px rgba(122, 219, 255, 0.18); transition: 220ms; }
    .submitBtn:hover { transform: translateY(-2px); filter: saturate(110%); }

    /* ---------------------------------
       SCREEN 2 - VISUALIZER
    --------------------------------- */
    #visualizerScreen { overflow: hidden; background: #010205; }
    
    /* Pre-rendered static background animated exclusively via GPU transform */
    .visualBg {
      position: absolute;
      inset: -50%; /* Massive oversize to never show edges while rotating */
      background: radial-gradient(circle at 30% 30%, rgba(86,205,255,0.12), transparent 40%),
                  radial-gradient(circle at 70% 70%, rgba(104,141,255,0.12), transparent 40%),
                  linear-gradient(135deg, #02040a 0%, #07101c 50%, #010205 100%);
      will-change: transform;
      transform-origin: center;
    }

    #particleCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.9; }

    #stage { position: absolute; inset: 0; z-index: 2; overflow: hidden; }

    .layer {
      position: absolute;
      left: 50%; top: 50%;
      width: var(--layer-size); height: var(--layer-size);
      /* Base centering via margin avoids recalculating origin bounds */
      margin-left: calc(var(--layer-size) / -2);
      margin-top: calc(var(--layer-size) / -2);
      pointer-events: none;
      will-change: transform;
      transform-style: preserve-3d;
      backface-visibility: hidden;
    }

    /* Outer wrapper for Translation (Spiral path) */
    .layerMotion {
      position: absolute; inset: 0;
      will-change: transform;
      transform-style: preserve-3d;
    }

    /* Inner wrapper for Rotation/Scale (Spinning) */
    .layerImgWrapper {
      position: absolute; inset: 0;
      will-change: transform, opacity;
      transform-origin: center center;
    }

    /* High-performance static glow instead of expensive drop-shadow */
    .staticGlow {
      position: absolute;
      inset: 15%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(127,232,255,0.3) 0%, transparent 60%);
      filter: blur(40px);
      z-index: 1;
    }

    .layerImg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; /* Guarantees image fills the massive container completely */
      user-select: none; -webkit-user-drag: none; pointer-events: none;
      mix-blend-mode: screen;
      z-index: 2;
      /* NO CSS FILTERS HERE! Keeps rotation buttery smooth */
    }

    /* Buttons */
    .topActions { position: absolute; top: 10px; right: 10px; z-index: 6; display: flex; gap: 8px; opacity: 0.08; transition: 220ms; }
    #visualizerScreen:hover .topActions, #visualizerScreen.show-ui .topActions { opacity: 0.8; }
    .iconBtn { width: 32px; height: 32px; border: 0; border-radius: 50%; background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; font-size: 14px; backdrop-filter: blur(10px); transition: 180ms; }
    .iconBtn:hover { transform: scale(1.1); background: rgba(255,255,255,0.2); }
    
    @media (max-width: 860px) { .grid { grid-template-columns: 1fr; } .panel { padding: 16px; } }
  </style>
</head>
<body>

  <!-- SCREEN 1 -->
  <section id="setupScreen" class="screen active">
    <div class="panel">
      <div class="hero">
        <div>
          <h1>Hyper Smooth Visualizer</h1>
          <p>Locked frame rates. Screen-filling imagery. Upload two transparent PNGs, tune opposite rotation, and launch.</p>
        </div>
      </div>
      <div class="grid">
        <div class="card">
          <h2>Images</h2>
          <div class="uploadBox">
            <div class="fileWrap">
              <label class="fileButton">
                <div><div style="font-weight:800; color:#eaf8ff;">Upload PNG — Image A</div><div style="font-size:13px; color:var(--text-soft);">Clockwise layer</div></div>
                <input id="file1" type="file" accept="image/png" />
              </label>
              <div class="fileMeta"><span id="file1Name">Empty</span><span id="file1State"></span></div>
            </div>
            <div class="fileWrap">
              <label class="fileButton">
                <div><div style="font-weight:800; color:#eaf8ff;">Upload PNG — Image B</div><div style="font-size:13px; color:var(--text-soft);">Counterclockwise layer</div></div>
                <input id="file2" type="file" accept="image/png" />
              </label>
              <div class="fileMeta"><span id="file2Name">Empty</span><span id="file2State"></span></div>
            </div>
          </div>
        </div>
        <div class="card">
          <h2>Rotation speeds</h2>
          <div class="controls">
            <div class="row">
              <div class="labelLine"><span>Image A — clockwise</span><span class="value" id="speed1Val">48°/s</span></div>
              <input id="speed1" type="range" min="0" max="300" value="48" />
            </div>
            <div class="row">
              <div class="labelLine"><span>Image B — counterclockwise</span><span class="value" id="speed2Val">64°/s</span></div>
              <input id="speed2" type="range" min="0" max="300" value="64" style="transform: scaleX(-1)" />
            </div>
          </div>
        </div>
      </div>
      <div class="footer"><button id="submitBtn" class="submitBtn">Launch Immersive Mode</button></div>
    </div>
  </section>

  <!-- SCREEN 2 -->
  <section id="visualizerScreen" class="screen" aria-hidden="true">
    <div id="visualBg" class="visualBg"></div>
    <canvas id="particleCanvas"></canvas>

    <div id="stage">
      <div id="layerA" class="layer">
        <div id="motionA" class="layerMotion">
          <div id="wrapA" class="layerImgWrapper">
            <div class="staticGlow"></div>
            <img id="imgA" class="layerImg" alt="" />
          </div>
        </div>
      </div>

      <div id="layerB" class="layer">
        <div id="motionB" class="layerMotion">
          <div id="wrapB" class="layerImgWrapper">
            <div class="staticGlow" style="background: radial-gradient(circle, rgba(104,141,255,0.3) 0%, transparent 60%);"></div>
            <img id="imgB" class="layerImg" alt="" />
          </div>
        </div>
      </div>
    </div>

    <div class="topActions">
      <button id="fullscreenBtn" class="iconBtn" title="Toggle Fullscreen">⤢</button>
      <button id="closeBtn" class="iconBtn" title="Close">✕</button>
    </div>
  </section>

  <script>
    const setupScreen = document.getElementById('setupScreen');
    const visualizerScreen = document.getElementById('visualizerScreen');
    
    // Inputs
    const file1 = document.getElementById('file1');
    const file2 = document.getElementById('file2');
    const speed1 = document.getElementById('speed1');
    const speed2 = document.getElementById('speed2');
    
    // Visualizer Elements
    const visualBg = document.getElementById('visualBg');
    const layerA = document.getElementById('layerA');
    const layerB = document.getElementById('layerB');
    const motionA = document.getElementById('motionA');
    const motionB = document.getElementById('motionB');
    const wrapA = document.getElementById('wrapA');
    const wrapB = document.getElementById('wrapB');
    const imgA = document.getElementById('imgA');
    const imgB = document.getElementById('imgB');
    
    const canvas = document.getElementById('particleCanvas');
    const ctx = canvas.getContext('2d', { alpha: false }); // Optimization for base canvas layer

    // State
    const state = {
      urls: [null, null],
      running: false,
      startTime: 0,
      particles: [],
      pCanvas: null // Pre-rendered particle
    };

    // ----------------------------------------------------
    // PRE-RENDER PARTICLE (MASSIVE CPU SAVINGS)
    // ----------------------------------------------------
    function initParticleSprite() {
      state.pCanvas = document.createElement('canvas');
      state.pCanvas.width = 64;
      state.pCanvas.height = 64;
      const pCtx = state.pCanvas.getContext('2d');
      const grad = pCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.3, 'rgba(127,232,255,0.8)');
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      pCtx.fillStyle = grad;
      pCtx.fillRect(0, 0, 64, 64);
    }
    initParticleSprite();

    function updateLayerSize() {
      // Create a massive layer that covers the screen at any angle
      const diagonal = Math.hypot(window.innerWidth, window.innerHeight);
      const size = Math.max(Math.ceil(diagonal * 1.5), 1800); // 1.5x overscan guarantees corners never clip
      document.documentElement.style.setProperty('--layer-size', `${size}px`);
    }

    function syncLayers() {
      layerA.style.display = state.urls[0] ? 'block' : 'none';
      layerB.style.display = state.urls[1] ? 'block' : 'none';
    }

    function handleFile(e, index) {
      const file = e.target.files[0];
      const img = index === 0 ? imgA : imgB;
      const nameStr = index === 0 ? 'file1Name' : 'file2Name';
      
      if (!file || file.type !== 'image/png') return;
      if (state.urls[index]) URL.revokeObjectURL(state.urls[index]);
      
      state.urls[index] = URL.createObjectURL(file);
      img.src = state.urls[index];
      document.getElementById(nameStr).textContent = "Ready";
      syncLayers();
    }

    file1.addEventListener('change', e => handleFile(e, 0));
    file2.addEventListener('change', e => handleFile(e, 1));
    speed1.addEventListener('input', e => document.getElementById('speed1Val').textContent = e.target.value + '°/s');
    speed2.addEventListener('input', e => document.getElementById('speed2Val').textContent = e.target.value + '°/s');

    // ----------------------------------------------------
    // PARTICLES
    // ----------------------------------------------------
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const count = Math.min(40, Math.floor((window.innerWidth * window.innerHeight) / 45000));
      state.particles = Array.from({ length: count }, () => ({
        angle: Math.random() * Math.PI * 2,
        radius: Math.random() * Math.max(window.innerWidth, window.innerHeight) * 0.6,
        size: 0.5 + Math.random() * 1.5,
        speed: 0.00015 + Math.random() * 0.0003,
        alpha: 0.05 + Math.random() * 0.15,
        phase: Math.random() * Math.PI * 2
      }));
    }

    function drawParticles(t) {
      ctx.fillStyle = '#010205'; // Fast clear
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const cx = canvas.width / 2;
      const cy = canvas.height / 2;

      for (let i = 0; i < state.particles.length; i++) {
        const p = state.particles[i];
        const a = p.angle + t * p.speed;
        const r = p.radius * (0.95 + 0.05 * Math.sin(t * 0.001 + p.phase));
        const x = cx + Math.cos(a) * r;
        const y = cy + Math.sin(a) * r;

        ctx.globalAlpha = p.alpha * (0.6 + 0.4 * Math.sin(t * 0.0015 + p.phase));
        const drawSize = p.size * 32; 
        
        // Fast blit from pre-rendered canvas
        ctx.drawImage(state.pCanvas, x - drawSize/2, y - drawSize/2, drawSize, drawSize);
      }
      ctx.globalAlpha = 1.0;
    }

    // ----------------------------------------------------
    // SUPER SMOOTH GPU LOOP
    // ----------------------------------------------------
    function animate(now) {
      if (!state.startTime) state.startTime = now;
      const elapsed = (now - state.startTime) / 1000;
      
      if (state.running) {
        // 1. Draw particles
        drawParticles(now);

        // 2. Hardware-accelerated background motion
        visualBg.style.transform = `scale(1.2) rotate(${elapsed * 2}deg)`;

        // 3. Hardware-accelerated layer transforms
        const sA = Number(speed1.value);
        const sB = Number(speed2.value);
        
        const minSide = Math.min(window.innerWidth, window.innerHeight);
        const orbitRadius = minSide * 0.025; // Keep center tight

        // Calculate smooth paths
        const ax = Math.cos(elapsed * 0.8) * orbitRadius;
        const ay = Math.sin(elapsed * 0.9) * orbitRadius;
        const bx = Math.cos(elapsed * 0.85 + Math.PI) * orbitRadius;
        const by = Math.sin(elapsed * 0.95 + Math.PI) * orbitRadius;

        const breathe = 1 + 0.02 * Math.sin(elapsed * 1.5);
        
        if (state.urls[0]) {
          // Translate wrapping div
          motionA.style.transform = `translate3d(${ax.toFixed(2)}px, ${ay.toFixed(2)}px, 0)`;
          // Rotate/Scale inner div
          wrapA.style.transform = `rotate(${(elapsed * sA).toFixed(2)}deg) scale(${breathe.toFixed(3)})`;
          wrapA.style.opacity = (0.95 + 0.05 * Math.sin(elapsed * 2)).toFixed(3);
        }

        if (state.urls[1]) {
          motionB.style.transform = `translate3d(${bx.toFixed(2)}px, ${by.toFixed(2)}px, 0)`;
          wrapB.style.transform = `rotate(${(-elapsed * sB).toFixed(2)}deg) scale(${(breathe * 0.98).toFixed(3)})`;
          wrapB.style.opacity = (0.95 + 0.05 * Math.cos(elapsed * 1.8)).toFixed(3);
        }
      }
      
      requestAnimationFrame(animate);
    }

    // ----------------------------------------------------
    // EVENTS
    // ----------------------------------------------------
    document.getElementById('submitBtn').addEventListener('click', () => {
      syncLayers();
      setupScreen.classList.remove('active');
      visualizerScreen.classList.add('active');
      state.running = true;
      visualizerScreen.classList.add('show-ui');
      setTimeout(() => visualizerScreen.classList.remove('show-ui'), 2000);
    });

    document.getElementById('closeBtn').addEventListener('click', async () => {
      state.running = false;
      if (document.fullscreenElement) await document.exitFullscreen().catch(()=>{});
      visualizerScreen.classList.remove('active');
      setupScreen.classList.add('active');
    });

    document.getElementById('fullscreenBtn').addEventListener('click', async () => {
      if (!document.fullscreenElement) await visualizerScreen.requestFullscreen().catch(()=>{});
      else await document.exitFullscreen().catch(()=>{});
    });

    visualizerScreen.addEventListener('mousemove', () => {
      visualizerScreen.classList.add('show-ui');
      clearTimeout(state.uiTimer);
      state.uiTimer = setTimeout(() => visualizerScreen.classList.remove('show-ui'), 1500);
    });

    window.addEventListener('resize', () => {
      updateLayerSize();
      resizeCanvas();
    });

    updateLayerSize();
    resizeCanvas();
    syncLayers();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
